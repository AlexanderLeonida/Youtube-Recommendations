# TwinTube Vector - Kubernetes Deployment
# Production-ready deployment with auto-scaling and zero-downtime updates
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twintube-ml
  namespace: twintube
  labels:
    app: twintube
    component: ml-service
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime updates
  selector:
    matchLabels:
      app: twintube
      component: ml-service
  template:
    metadata:
      labels:
        app: twintube
        component: ml-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: twintube
                  component: ml-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: ml-service
        image: twintube/ml-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: MODEL_PATH
          value: "/app/checkpoints/best_model.pt"
        - name: INDEX_PATH
          value: "/app/index/video_embeddings.faiss"
        - name: USE_QUANTIZATION
          value: "true"
        - name: USE_GPU_INDEX
          value: "true"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: twintube-config
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: twintube-config
              key: redis-port
        - name: USE_REDIS_CACHE
          value: "true"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4000m"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: model-storage
          mountPath: /app/checkpoints
        - name: index-storage
          mountPath: /app/index
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: twintube-models-pvc
      - name: index-storage
        persistentVolumeClaim:
          claimName: twintube-index-pvc
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twintube-backend
  namespace: twintube
  labels:
    app: twintube
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: twintube
      component: backend
  template:
    metadata:
      labels:
        app: twintube
        component: backend
    spec:
      containers:
      - name: backend
        image: twintube/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          name: http
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: twintube-db-secret
              key: host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: twintube-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: twintube-db-secret
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: twintube-db-secret
              key: database
        - name: OCR_SERVICE_URL
          value: "http://twintube-ocr:5000"
        - name: ML_SERVICE_URL
          value: "http://twintube-ml:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twintube-frontend
  namespace: twintube
  labels:
    app: twintube
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: twintube
      component: frontend
  template:
    metadata:
      labels:
        app: twintube
        component: frontend
    spec:
      containers:
      - name: frontend
        image: twintube/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: REACT_APP_API_URL
          value: "http://twintube-backend:4000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twintube-ocr
  namespace: twintube
  labels:
    app: twintube
    component: ocr-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: twintube
      component: ocr-service
  template:
    metadata:
      labels:
        app: twintube
        component: ocr-service
    spec:
      containers:
      - name: ocr-service
        image: twintube/ocr-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: twintube-db-secret
              key: host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: twintube-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: twintube-db-secret
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: twintube-db-secret
              key: database
        - name: ALLOW_HEADLESS_MODE
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
