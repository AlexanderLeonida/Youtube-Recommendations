version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: youtube-recommendations-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ytrecs
      MYSQL_USER: ytrecs
      MYSQL_PASSWORD: password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: youtube-recommendations-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: youtube-recommendations-backend
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      DB_HOST: mysql
      DB_USER: ytrecs
      DB_PASSWORD: password
      DB_NAME: ytrecs
      DB_PORT: 3306
      ML_SERVICE_URL: http://ml-service:8000
      OCR_SERVICE_URL: http://ocr-service:5000

  frontend:
    build: ./frontend
    container_name: youtube-recommendations-frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"

  ocr-service:
    build: ./ocr-service
    container_name: youtube-recommendations-ocr
    restart: always
    ports:
      - "5001:5000"
    environment:
      DB_HOST: mysql
      DB_USER: ytrecs
      DB_PASSWORD: password
      DB_NAME: ytrecs
      DB_PORT: 3306
      PORT: 5000
      DISPLAY: ${DISPLAY:-:0}
      ALLOW_HEADLESS_MODE: "true"
      MODELS_DIR: /app/models
      LLAMA_HF_REPO: bartowski/Llama-3.2-1B-Instruct-GGUF
      LLAMA_HF_FILENAME: Llama-3.2-1B-Instruct-Q4_K_M.gguf
      EMBED_MODEL: BAAI/bge-small-en-v1.5
      LLAMA_N_CTX: "2048"
      LLAMA_N_THREADS: "4"
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    volumes:
      - llama-models:/app/models
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started

  # TwinTube ML Recommendation Service
  ml-service:
    build: ./ml
    container_name: youtube-recommendations-ml
    restart: always
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/checkpoints/best_model.pt
      INDEX_PATH: /app/index/video_embeddings.faiss
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USE_QUANTIZATION: "true"
      USE_GPU_INDEX: "false"
      USE_REDIS_CACHE: "true"
    volumes:
      - ml-models:/app/checkpoints
      - ml-index:/app/index
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # C++ OpenCV OCR (for high-performance processing)
  opencv-ocr:
    build: ./opencv
    container_name: youtube-recommendations-opencv
    restart: "no"
    profiles:
      - tools
    volumes:
      - ./opencv/input:/usr/src/app/input
      - ./opencv/output:/usr/src/app/output

volumes:
  mysql-data:
  ml-models:
  ml-index:
  llama-models:
