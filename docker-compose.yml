version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: youtube-recommendations-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ytrecs
      MYSQL_USER: ytrecs
      MYSQL_PASSWORD: password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: youtube-recommendations-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: youtube-recommendations-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  mysql-data:
